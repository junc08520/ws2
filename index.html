        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Times New Roman', serif;
            background-color: var(--bg-dark);
            color: #ffffff;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;

        }

        /* 极简和谐背景：深绿渐变 + 穆斯林几何纹理 */
        .container {
            background: linear-gradient(135deg, #0a2e24 0%, var(--bg-dark) 100%);
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            position: relative;
        }

        /* 背景纹理层 */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(var(--pattern-color) 2px, transparent 2px),
                linear-gradient(45deg, var(--pattern-color) 25%, transparent 25%, transparent 75%, var(--pattern-color) 75%, var(--pattern-color) 100%),
                linear-gradient(135deg, var(--pattern-color) 25%, transparent 25%, transparent 75%, var(--pattern-color) 75%, var(--pattern-color) 100%);

            opacity: 0.5;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            max-width: 500px;
        }

        .icon {
            font-size: 35px;
            color: var(--primary-gold);
            margin-bottom: 15px;
            display: block;
        }

        h1 {
            font-size: 2.8rem;
            margin: 0;
            color: var(--primary-gold);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        h2 {

            margin: 10px 0 30px;
            font-weight: 300;
            color: #f0f0f0;
            letter-spacing: 1px;
        }

        p {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #cccccc;
            margin-bottom: 40px;
            font-style: italic;
        }

            font-weight: bold;
            font-size: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: 0.3s;
            border: none;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
        }

        .btn-ws:hover {
            transform: translateY(-3px);
            background-color: #20ba5a;
            box-shadow: 0 15px 25px rgba(37, 211, 102, 0.2);
        }

        .footer {

            opacity: 0.8;
            z-index: 2;
