    body {

      text-align: center;
    }
    .container { padding: 30px 20px; }
    .title { font-size: 26px; color: #ff7a00; }
    .subtitle { color: #ccc; margin-bottom: 30px; }
    .icons { display: flex; justify-content: space-around; }
    .circle {

    <script>
    function goWhatsApp() {
      // --- TikTok 事件 ---
      ttq.track('Contact'); 

      // --- Meta (Facebook) 事件 ---
      // 触发 "联系" 事件
      fbq('track', 'Contact');
      // 触发 "购买" (销量) 事件，您可以根据需要添加价值和货币
      fbq('track', 'Purchase', {value: 0.00, currency: 'USD'});

      // 延迟 300 毫秒跳转，确保像素追踪请求发出
      setTimeout(function(){
        window.location.href = "https://api.whatsapp.com/send/?phone=447846495830&text=I want to know about party activities.";
      }, 300);
    }
