<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رحلة المغامرة</title>

    <script>
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '909673501935607');

    <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=909673501935607&ev=PageView&noscript=1"
    /></noscript>
    <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: white;
      text-align: center;
    }
    .container { padding: 30px 20px; }
    .title { font-size: 26px; color: #ff7a00; }
    .subtitle { color: #ccc; margin-bottom: 30px; }
    .icons { display: flex; justify-content: space-around; }
    .circle {
      width: 60px; height: 60px;
      border: 2px solid #ff7a00;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: auto; color: #ff7a00;
    }
    .middle { margin: 30px 0; }
    .highlight { color: #ff7a00; margin-top: 20px; }
    .desc { color: #aaa; }
    .btn {
      display: block;
      margin: 40px auto;
      width: 90%; max-width: 400px;
      background: linear-gradient(90deg, #00c36f, #00e091);
      padding: 15px;
      border-radius: 30px;
      text-decoration: none;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      border: none;
    }
    </style>

    <script>
    function goWhatsApp() {
      // 1. 触发 Meta "联系" (Contact) 事件
      // 这是您销量目标中对应的联系动作
      if (typeof fbq === 'function') {
          fbq('track', 'Contact');
          console.log('FB Contact Event Tracked');
      }

      // 2. 延迟 500 毫秒后再执行跳转
      // 关键：如果没有这个延迟，浏览器会直接掐断未发完的 FB 请求
      setTimeout(function() {
        window.location.href = "https://api.whatsapp.com/send/?phone=447846495830&text=I want to know about party activities.";
      }, 500); 
    }
    </script>

</head>

<body>

<div class="container">

  <div class="title">انطلق في رحلة المغامرة</div>
  <div class="subtitle">تعرف على أصدقاء جدد في الأنشطة الخارجية</div>

  <div class="icons">
    <div>
      <div class="circle">🏖</div>
      <div>رحلات بحرية</div>
    </div>
    <div>
      <div class="circle">🏊</div>
      <div>أنشطة مائية</div>
    </div>
    <div>
      <div class="circle">⛰</div>
      <div>تسلق الجبال</div>
    </div>
    <div>
      <div class="circle">🔥</div>
      <div>سهرات</div>
    </div>
  </div>

  <div class="middle">
    <div class="circle">🏕</div>
    <div>تخييم صحراوي</div>
  </div>

  <div class="highlight">مغامرات لا تُنسى — أصدقاء جدد — ذكريات رائعة</div>
  <div class="desc">انضم إلى مجتمع عشاق الطبيعة</div>

  <button onclick="goWhatsApp()" class="btn">
    انضم إلى WhatsApp الآن
  </button>

</div>

</body>
</html>
